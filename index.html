<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tres en Raya - Tic Tac Toe</title>
    <link rel="stylesheet" href="src/assets/styles.css">
</head>
<body>
    <div id="startScreen" class="start-screen">
        <div class="start-card">
            <h1 class="start-title">🎮 Tres en Raya</h1>
            <p class="start-subtitle">Configura tu partida</p>
            <form id="startForm" class="start-form">
                <label for="playerName" class="start-label">Nombre del jugador</label>
                <input id="playerName" class="start-input" type="text" placeholder="Tu nombre" required>

                <label for="gameModeSelect" class="start-label">Modo de juego</label>
                <select id="gameModeSelect" class="start-select">
                    <option value="ai" selected>Contra la IA</option>
                    <option value="local">Dos jugadores</option>
                </select>

                <label for="startDifficulty" class="start-label">Dificultad (solo IA)</label>
                <select id="startDifficulty" class="start-select">
                    <option value="easy">Fácil</option>
                    <option value="medium" selected>Medio</option>
                    <option value="hard">Difícil</option>
                </select>

                <button type="submit" class="btn btn-primary start-button">Empezar</button>
            </form>
        </div>
    </div>

    <div id="gameScreen" class="game-screen" style="display: none;">
    <div id="app" class="container">
        <header class="header">
            <div class="header-actions">
                <button id="themeToggle" class="btn btn-theme" aria-label="Cambiar tema" title="Cambiar entre modo claro y oscuro">🌙 Modo oscuro</button>
            </div>
            <h1>🎮 Tres en Raya</h1>
            <p class="subtitle">Juega contra la máquina</p>
        </header>

        <div class="game-info">
            <div class="stats">
                <div class="stat">
                    <span class="label" id="playerLabel">Tú (X)</span>
                    <span class="value" id="playerScore">0</span>
                </div>
                <div class="stat">
                    <span class="label" id="machineLabel">Máquina (O)</span>
                    <span class="value" id="machineScore">0</span>
                </div>
                <div class="stat">
                    <span class="label">Empates</span>
                    <span class="value" id="drawScore">0</span>
                </div>
            </div>

            <div class="scoreboard">
                <div class="score-item">
                    <span class="label">Puntos Tú</span>
                    <span class="value" id="playerPoints">0</span>
                </div>
                <div class="score-item">
                    <span class="label">Puntos Rival</span>
                    <span class="value" id="machinePoints">0</span>
                </div>
            </div>
        </div>

        <div class="status-bar">
            <p id="status" class="status">Tu turno</p>
        </div>

        <div class="game-board" id="gameBoard">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <div id="winMessage" class="win-message" aria-live="polite">
            <div class="win-card">
                <div class="win-emoji">🏆</div>
                <p class="win-text">¡Has ganado!</p>
                <button id="closeWinMessage" class="btn btn-secondary">Cerrar</button>
            </div>
        </div>

        <div class="button-group">
            <button id="resetBtn" class="btn btn-primary">Nuevo Juego</button>
            <button id="resetStatsBtn" class="btn btn-secondary">Reiniciar Puntuación</button>
        </div>

        <div class="difficulty">
            <label for="difficultySelect">Dificultad:</label>
            <select id="difficultySelect">
                <option value="easy">Fácil</option>
                <option value="medium" selected>Medio</option>
                <option value="hard">Difícil</option>
            </select>
        </div>

        <div class="board-customizer">
            <label for="boardStyleSelect">Estilo del tablero:</label>
            <select id="boardStyleSelect">
                <option value="glass" selected>Cristal</option>
                <option value="metal">Metal</option>
                <option value="classic">Clásico</option>
                <option value="neon">Neón</option>
                <option value="wood">Madera</option>
                <option value="custom">Personalizado</option>
            </select>

            <div class="color-controls">
                <div class="color-control">
                    <label for="boardBgColor">Color tablero</label>
                    <input type="color" id="boardBgColor" value="#e2eeff">
                </div>
                <div class="color-control">
                    <label for="cellBgColor">Color casillas</label>
                    <input type="color" id="cellBgColor" value="#ffffff">
                </div>
            </div>

            <button id="boardStyleResetBtn" class="btn btn-secondary">Reiniciar estilo</button>
        </div>
    </div>
    </div>

    <script src="src/app/game-logic.js"></script>
    <script src="src/app/ai-player.js"></script>
    <script src="src/app/app.js"></script>
</body>
</html>
